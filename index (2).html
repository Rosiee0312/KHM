<html lang="vi">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer - Product Fit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .bar-transition { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Phân tích mức độ phù hợp Khách hàng - Sản phẩm</h1>
            <p class="text-slate-500 text-sm">Dữ liệu giao dịch theo nhóm tuổi và phân bổ giá sản phẩm</p>
        </header>

        <!-- Filters -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
            <div class="flex flex-col gap-4">
                <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Chọn Nhóm Tuổi</label>
                <div id="ageTabs" class="flex flex-wrap gap-2">
                    <!-- Tabs generated by JS -->
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div id="statsRow" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <!-- Stats generated by JS -->
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Left Panel: Products -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-slate-700 flex items-center gap-2">
                        <i data-lucide="package" class="w-5 h-5 text-blue-500"></i>
                        Xếp hạng sản phẩm
                    </h3>
                    <span class="text-xs text-slate-400 uppercase font-medium">Theo số KH giao dịch</span>
                </div>
                <div id="productBars" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Bars generated by JS -->
                </div>
            </div>

            <!-- Right Panel: Price Distribution -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 min-h-[400px]">
                <div id="priceHeader" class="mb-6">
                    <h3 class="font-bold text-slate-700 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-5 h-5 text-emerald-500"></i>
                        Phân bổ mức giá
                    </h3>
                </div>
                <div id="priceBars" class="space-y-4">
                    <!-- Content generated by JS -->
                </div>
            </div>
        </div>
    </div>

        const ageGroups = Object.keys(RAW["KH Mới"]);
        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4', '#f97316'];

        let selectedAge = ageGroups[0];
        let selectedProduct = null;

        const fmt = (n) => n.toLocaleString('vi-VN');
        const pct = (v, t) => t > 0 ? Math.round((v / t) * 100) : 0;

        function buildAgeTabs() {
            const tabs = document.getElementById('ageTabs');
            tabs.innerHTML = '';
            ageGroups.forEach(ag => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 border ${
                    ag === selectedAge 
                    ? 'bg-blue-600 text-white border-blue-600 shadow-md' 
                    : 'bg-white text-slate-600 border-slate-200 hover:border-blue-300 hover:bg-blue-50'
                }`;
                btn.textContent = ag;
                btn.onclick = () => { 
                    selectedAge = ag; 
                    selectedProduct = null; 
                    render(); 
                };
                tabs.appendChild(btn);
            });
        }

        function render() {
            buildAgeTabs();
            const ageData = RAW["KH Mới"][selectedAge];
            const products = Object.entries(ageData).sort((a, b) => b[1].total - a[1].total);
            const totalKH = products.reduce((s, [, v]) => s + v.total, 0);
            
            // Render Stats
            const topProduct = products[0];
            document.getElementById('statsRow').innerHTML = `
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Tổng KH giao dịch</p>
                    <p class="text-2xl font-bold text-slate-800">${fmt(totalKH)}</p>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Số dòng sản phẩm</p>
                    <p class="text-2xl font-bold text-slate-800">${products.length}</p>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Sản phẩm dẫn đầu</p>
                    <div class="flex items-baseline gap-2">
                        <p class="text-lg font-bold text-blue-600 truncate">${topProduct[0]}</p>
                        <p class="text-sm font-medium text-slate-400">${pct(topProduct[1].total, totalKH)}%</p>
                    </div>
                </div>
            `;

            // Render Product Ranking
            const productContainer = document.getElementById('productBars');
            productContainer.innerHTML = '';
            const maxVal = products[0][1].total;

            products.forEach(([name, info], i) => {
                const isSelected = name === selectedProduct;
                const color = COLORS[i % COLORS.length];
                const percentage = (info.total / maxVal) * 100;

                const item = document.createElement('div');
                item.className = `group cursor-pointer p-3 rounded-xl transition-all ${
                    isSelected ? 'bg-blue-50 border border-blue-100' : 'hover:bg-slate-50'
                }`;
                item.onclick = () => { selectedProduct = name; render(); };
                
                item.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-semibold text-slate-700 truncate w-40">${name}</span>
                        <span class="text-xs font-bold text-slate-500">${fmt(info.total)} <small class="font-normal">(${pct(info.total, totalKH)}%)</small></span>
                    </div>
                    <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                        <div class="bar-transition h-full rounded-full" style="width: ${percentage}%; background-color: ${color}; opacity: ${isSelected ? '1' : '0.6'}"></div>
                    </div>
                `;
                productContainer.appendChild(item);
            });

            // Render Price Panel
            const priceContainer = document.getElementById('priceBars');
            const priceHeader = document.getElementById('priceHeader');

            if (!selectedProduct) {
                priceContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-slate-400">
                        <i data-lucide="arrow-left-circle" class="w-10 h-10 mb-2 opacity-20"></i>
                        <p class="text-sm">Chọn một sản phẩm bên trái để xem chi tiết</p>
                    </div>
                `;
            } else {
                const prod = ageData[selectedProduct];
                const prices = Object.entries(prod.prices).sort((a, b) => b[1] - a[1]);
                const maxPriceCount = prices[0][1] || 1;
                const colorIdx = products.findIndex(([n]) => n === selectedProduct);
                const color = COLORS[colorIdx % COLORS.length];

                priceHeader.innerHTML = `
                    <h3 class="font-bold text-slate-700 flex items-center gap-2">
                        <i data-lucide="tag" class="w-5 h-5" style="color: ${color}"></i>
                        ${selectedProduct}
                    </h3>
                    <p class="text-xs text-slate-400 mt-1 uppercase">Phân bổ giá (Tỷ lệ trên tổng ${selectedProduct})</p>
                `;

                priceContainer.innerHTML = '';
                prices.forEach(([range, val]) => {
                    const pricePercentage = (val / maxPriceCount) * 100;
                    const row = document.createElement('div');
                    row.className = 'space-y-1.5';
                    row.innerHTML = `
                        <div class="flex justify-between text-[11px] font-medium text-slate-500">
                            <span>${range}</span>
                            <span>${fmt(val)} (${pct(val, prod.total)}%)</span>
                        </div>
                        <div class="w-full bg-slate-50 h-2 rounded-full overflow-hidden border border-slate-100">
                            <div class="bar-transition h-full rounded-full opacity-80" style="width: ${pricePercentage}%; background-color: ${color}"></div>
                        </div>
                    `;
                    priceContainer.appendChild(row);
                });
            }
            lucide.createIcons();
        }

        window.onload = () => {
            render();
        };
    </script>
